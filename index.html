<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaraav Prompt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        xblack: '#000000',
                        xgray: { 100: '#16181C', 200: '#1D1F23', 300: '#2F3336', 400: '#3E4144', 500: '#536471', 600: '#71767B', 700: '#E7E9EA', 800: '#F7F9F9' },
                        xaccent: '#1D9BF0'
                    },
                    fontFamily: {
                        sans: ['"Segoe UI"', '"Vazirmatn"', '"Tahoma"', 'Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Vazirmatn', Tahoma, Arial, sans-serif; background: #000; color: #E7E9EA; }
        .rtl-text { direction: rtl; text-align: right; }
        .ltr-text { direction: ltr; text-align: left; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #16181C; }
        ::-webkit-scrollbar-thumb { background: #3E4144; border-radius: 3px; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { background: #1D1F23; border-color: #3E4144; }
        .sidebar-item { transition: all 0.15s ease; }
        .sidebar-item:hover { background: #1D1F23; }
        .sidebar-item.active { background: #1D1F23; border-right: 3px solid #1D9BF0; }
        .copy-btn { transition: all 0.2s ease; }
        .copy-btn:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .tag { transition: all 0.15s ease; }
        .tag:hover { filter: brightness(1.2); }
        textarea { resize: vertical; min-height: 100px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-xblack border-r border-xgray-300 flex flex-col h-screen flex-shrink-0 overflow-hidden">
        <div class="p-4 border-b border-xgray-300">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg class="w-7 h-7 text-xaccent" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                Yaraav Prompt
            </h1>
            <p class="text-xs text-xgray-500 mt-1">Smart Prompt Manager</p>
        </div>

        <div class="p-3 border-b border-xgray-300">
            <button onclick="showNewProjectModal()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-xaccent/10 text-xaccent hover:bg-xaccent/20 text-sm font-medium transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                New Project
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-2">
            <div class="mb-4">
                <h3 class="text-xs font-semibold text-xgray-500 uppercase tracking-wider px-3 mb-2">Projects</h3>
                <div id="projectList" class="space-y-1">
                    <div onclick="selectProject('all')" class="sidebar-item active flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer text-sm" data-project="all">
                        <svg class="w-4 h-4 text-xgray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        All Prompts
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-xs font-semibold text-xgray-500 uppercase tracking-wider px-3 mb-2">Categories</h3>
                <div id="categoryList" class="space-y-1">
                    <div onclick="selectCategory('all')" class="sidebar-item active flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer text-sm" data-category="all">
                        <svg class="w-4 h-4 text-xgray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                        All Categories
                    </div>
                </div>
            </div>
        </div>

        <div class="p-3 border-t border-xgray-300">
            <div class="text-xs text-xgray-500 text-center" id="statsBar">0 prompts</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Top Bar -->
        <header class="border-b border-xgray-300 bg-xblack/80 backdrop-blur-md sticky top-0 z-30">
            <div class="flex items-center gap-4 px-6 py-3">
                <button onclick="toggleSidebar()" class="md:hidden text-xgray-600 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="flex-1 relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-xgray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Search prompts by title, content, project, or category..." class="w-full bg-xgray-100 border border-xgray-300 rounded-full px-4 pl-10 py-2 text-sm text-xgray-700 placeholder-xgray-500 focus:outline-none focus:border-xaccent/50 focus:ring-1 focus:ring-xaccent/30 transition" oninput="filterPrompts()">
                </div>
                <button onclick="showNewPromptModal()" class="flex items-center gap-2 px-4 py-2 bg-xaccent rounded-full text-sm font-bold hover:bg-blue-500 transition flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    New Prompt
                </button>
            </div>
        </header>

        <!-- Prompt Grid -->
        <div class="flex-1 overflow-y-auto p-6" id="promptContainer">
            <div id="emptyState" class="hidden flex flex-col items-center justify-center h-full text-center">
                <svg class="w-16 h-16 text-xgray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <h3 class="text-lg font-semibold text-xgray-500 mb-2">No prompts yet</h3>
                <p class="text-sm text-xgray-500 mb-4">Create your first prompt to get started</p>
                <button onclick="showNewPromptModal()" class="px-4 py-2 bg-xaccent rounded-full text-sm font-bold hover:bg-blue-500 transition">Create Prompt</button>
            </div>
            <div id="promptGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <!-- New/Edit Prompt Modal -->
    <div id="promptModal" class="fixed inset-0 modal-overlay z-50 hidden items-center justify-center p-4">
        <div class="bg-xblack border border-xgray-300 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto fade-in">
            <div class="flex items-center justify-between p-4 border-b border-xgray-300">
                <h2 id="promptModalTitle" class="text-lg font-bold">New Prompt</h2>
                <button onclick="closePromptModal()" class="text-xgray-500 hover:text-white p-1 rounded-full hover:bg-xgray-300/50 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="p-4 space-y-4">
                <input type="hidden" id="editPromptId">
                <div>
                    <label class="block text-sm font-medium text-xgray-600 mb-1">Title</label>
                    <input type="text" id="promptTitle" class="w-full bg-xgray-100 border border-xgray-300 rounded-xl px-4 py-2.5 text-sm text-xgray-700 focus:outline-none focus:border-xaccent/50 focus:ring-1 focus:ring-xaccent/30 transition" placeholder="Enter prompt title">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-xgray-600 mb-1">Project</label>
                        <select id="promptProject" class="w-full bg-xgray-100 border border-xgray-300 rounded-xl px-4 py-2.5 text-sm text-xgray-700 focus:outline-none focus:border-xaccent/50 focus:ring-1 focus:ring-xaccent/30 transition">
                            <option value="">No Project</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-xgray-600 mb-1">Category</label>
                        <input type="text" id="promptCategory" class="w-full bg-xgray-100 border border-xgray-300 rounded-xl px-4 py-2.5 text-sm text-xgray-700 focus:outline-none focus:border-xaccent/50 focus:ring-1 focus:ring-xaccent/30 transition" placeholder="e.g., Code, Writing, Translation">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-xgray-600 mb-1">Content</label>
                    <textarea id="promptContent" class="w-full bg-xgray-100 border border-xgray-300 rounded-xl px-4 py-3 text-sm text-xgray-700 focus:outline-none focus:border-xaccent/50 focus:ring-1 focus:ring-xaccent/30 transition" rows="6" placeholder="Enter your prompt content..."></textarea>
                    <div class="flex justify-between mt-1">
                        <span class="text-xs text-xgray-500">Auto RTL detection enabled</span>
                        <span id="modalCharCount" class="text-xs text-xgray-500">0 chars</span>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 p-4 border-t border-xgray-300">
                <button onclick="closePromptModal()" class="px-4 py-2 text-sm font-medium text-xgray-600 hover:text-white transition">Cancel</button>
                <button onclick="savePrompt()" class="px-6 py-2 bg-xaccent rounded-full text-sm font-bold hover:bg-blue-500 transition">Save</button>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="projectModal" class="fixed inset-0 modal-overlay z-50 hidden items-center justify-center p-4">
        <div class="bg-xblack border border-xgray-300 rounded-2xl w-full max-w-md fade-in">
            <div class="flex items-center justify-between p-4 border-b border-xgray-300">
                <h2 class="text-lg font-bold">New Project</h2>
                <button onclick="closeProjectModal()" class="text-xgray-500 hover:text-white p-1 rounded-full hover:bg-xgray-300/50 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="p-4">
                <label class="block text-sm font-medium text-xgray-600 mb-1">Project Name</label>
                <input type="text" id="projectName" class="w-full bg-xgray-100 border border-xgray-300 rounded-xl px-4 py-2.5 text-sm text-xgray-700 focus:outline-none focus:border-xaccent/50 focus:ring-1 focus:ring-xaccent/30 transition" placeholder="e.g., AI Coding" onkeydown="if(event.key==='Enter')saveProject()">
            </div>
            <div class="flex justify-end gap-3 p-4 border-t border-xgray-300">
                <button onclick="closeProjectModal()" class="px-4 py-2 text-sm font-medium text-xgray-600 hover:text-white transition">Cancel</button>
                <button onclick="saveProject()" class="px-6 py-2 bg-xaccent rounded-full text-sm font-bold hover:bg-blue-500 transition">Create</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg z-[100] hidden transition-all duration-300"></div>

    <script>
        // ===== State =====
        let state = { prompts: [], projects: [], selectedProject: 'all', selectedCategory: 'all', searchQuery: '' };

        // ===== Persistence =====
        function loadState() {
            try {
                const saved = localStorage.getItem('yaraav_prompt_data');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.prompts = parsed.prompts || [];
                    state.projects = parsed.projects || [];
                }
            } catch (e) { console.error('Failed to load state:', e); }
        }

        function saveState() {
            try {
                localStorage.setItem('yaraav_prompt_data', JSON.stringify({ prompts: state.prompts, projects: state.projects }));
            } catch (e) { console.error('Failed to save state:', e); }
        }

        // ===== RTL Detection =====
        function isRTL(text) {
            if (!text) return false;
            const rtlChars = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
            const firstChar = text.trim().charAt(0);
            return rtlChars.test(firstChar);
        }

        // ===== Render Functions =====
        function renderProjects() {
            const container = document.getElementById('projectList');
            let html = `<div onclick="selectProject('all')" class="sidebar-item ${state.selectedProject === 'all' ? 'active' : ''} flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer text-sm" data-project="all">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-xgray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                    All Prompts
                </div>
                <span class="text-xs text-xgray-500">${state.prompts.length}</span>
            </div>`;

            state.projects.forEach(project => {
                const count = state.prompts.filter(p => p.project === project).length;
                html += `<div onclick="selectProject('${project.replace(/'/g, "\\'")}')" class="sidebar-item ${state.selectedProject === project ? 'active' : ''} flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer text-sm group" data-project="${project}">
                    <div class="flex items-center gap-2 truncate">
                        <svg class="w-4 h-4 text-xaccent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        <span class="truncate">${escapeHtml(project)}</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="text-xs text-xgray-500">${count}</span>
                        <button onclick="event.stopPropagation();deleteProject('${project.replace(/'/g, "\\'")}')" class="opacity-0 group-hover:opacity-100 text-xgray-500 hover:text-red-400 p-0.5 transition" title="Delete project">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            updateProjectSelect();
        }

        function renderCategories() {
            const categories = [...new Set(state.prompts.map(p => p.category).filter(Boolean))];
            const container = document.getElementById('categoryList');
            let html = `<div onclick="selectCategory('all')" class="sidebar-item ${state.selectedCategory === 'all' ? 'active' : ''} flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer text-sm" data-category="all">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-xgray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                    All Categories
                </div>
                <span class="text-xs text-xgray-500">${state.prompts.length}</span>
            </div>`;

            categories.forEach(cat => {
                const count = state.prompts.filter(p => p.category === cat).length;
                html += `<div onclick="selectCategory('${cat.replace(/'/g, "\\'")}')" class="sidebar-item ${state.selectedCategory === cat ? 'active' : ''} flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer text-sm" data-category="${cat}">
                    <div class="flex items-center gap-2 truncate">
                        <div class="w-2 h-2 rounded-full bg-xaccent flex-shrink-0"></div>
                        <span class="truncate">${escapeHtml(cat)}</span>
                    </div>
                    <span class="text-xs text-xgray-500">${count}</span>
                </div>`;
            });

            container.innerHTML = html;
        }

        function renderPrompts() {
            const filtered = getFilteredPrompts();
            const grid = document.getElementById('promptGrid');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            let html = '';

            filtered.forEach(prompt => {
                const rtl = isRTL(prompt.content);
                const charCount = prompt.content.length;
                const displayContent = prompt.content.length > 300 ? prompt.content.substring(0, 300) + '...' : prompt.content;

                html += `<div class="bg-xblack border border-xgray-300 rounded-2xl p-4 card-hover fade-in" data-id="${prompt.id}">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-base truncate text-xgray-800">${escapeHtml(prompt.title)}</h3>
                            <div class="flex items-center gap-2 mt-1 flex-wrap">
                                ${prompt.project ? `<span class="text-xs px-2 py-0.5 rounded-full bg-xaccent/10 text-xaccent">${escapeHtml(prompt.project)}</span>` : ''}
                                ${prompt.category ? `<span class="text-xs px-2 py-0.5 rounded-full bg-xgray-300 text-xgray-700">${escapeHtml(prompt.category)}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-1 ml-2 flex-shrink-0">
                            <button onclick="toggleRTL('${prompt.id}')" class="p-1.5 rounded-lg text-xgray-500 hover:text-white hover:bg-xgray-300/50 transition text-xs font-mono" title="Toggle RTL/LTR">
                                ${prompt.rtlOverride === true ? 'RTL' : prompt.rtlOverride === false ? 'LTR' : 'Auto'}
                            </button>
                            <button onclick="showEditPromptModal('${prompt.id}')" class="p-1.5 rounded-lg text-xgray-500 hover:text-xaccent hover:bg-xgray-300/50 transition" title="Edit">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            </button>
                            <button onclick="deletePrompt('${prompt.id}')" class="p-1.5 rounded-lg text-xgray-500 hover:text-red-400 hover:bg-xgray-300/50 transition" title="Delete">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <pre class="${rtl ? 'rtl-text' : 'ltr-text'} text-sm text-xgray-700 whitespace-pre-wrap break-words font-sans leading-relaxed max-h-48 overflow-y-auto">${escapeHtml(displayContent)}</pre>
                    </div>
                    <div class="flex items-center justify-between pt-2 border-t border-xgray-300/50">
                        <span class="text-xs text-xgray-500">${charCount.toLocaleString()} chars</span>
                        <button onclick="copyPrompt('${prompt.id}')" class="copy-btn flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-xaccent/10 text-xaccent hover:bg-xaccent/20 text-xs font-medium transition" id="copyBtn-${prompt.id}">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                            Copy
                        </button>
                    </div>
                </div>`;
            });

            grid.innerHTML = html;
            updateStats();
        }

        function updateProjectSelect() {
            const select = document.getElementById('promptProject');
            const current = select.value;
            select.innerHTML = '<option value="">No Project</option>';
            state.projects.forEach(p => {
                select.innerHTML += `<option value="${escapeHtml(p)}" ${p === current ? 'selected' : ''}>${escapeHtml(p)}</option>`;
            });
        }

        function updateStats() {
            const total = state.prompts.length;
            const filtered = getFilteredPrompts().length;
            document.getElementById('statsBar').textContent = `${filtered} of ${total} prompts`;
        }

        // ===== Filter & Search =====
        function getFilteredPrompts() {
            return state.prompts.filter(p => {
                if (state.selectedProject !== 'all' && p.project !== state.selectedProject) return false;
                if (state.selectedCategory !== 'all' && p.category !== state.selectedCategory) return false;
                if (state.searchQuery) {
                    const q = state.searchQuery.toLowerCase();
                    return p.title.toLowerCase().includes(q) ||
                           p.content.toLowerCase().includes(q) ||
                           (p.project && p.project.toLowerCase().includes(q)) ||
                           (p.category && p.category.toLowerCase().includes(q));
                }
                return true;
            });
        }

        function filterPrompts() {
            state.searchQuery = document.getElementById('searchInput').value;
            renderPrompts();
        }

        function selectProject(project) {
            state.selectedProject = project;
            document.querySelectorAll('#projectList .sidebar-item').forEach(el => {
                el.classList.toggle('active', el.dataset.project === project);
            });
            renderPrompts();
        }

        function selectCategory(category) {
            state.selectedCategory = category;
            document.querySelectorAll('#categoryList .sidebar-item').forEach(el => {
                el.classList.toggle('active', el.dataset.category === category);
            });
            renderPrompts();
        }

        // ===== Prompt CRUD =====
        function showNewPromptModal() {
            document.getElementById('promptModalTitle').textContent = 'New Prompt';
            document.getElementById('editPromptId').value = '';
            document.getElementById('promptTitle').value = '';
            document.getElementById('promptProject').value = '';
            document.getElementById('promptCategory').value = '';
            document.getElementById('promptContent').value = '';
            document.getElementById('modalCharCount').textContent = '0 chars';
            updateProjectSelect();
            document.getElementById('promptModal').classList.remove('hidden');
            document.getElementById('promptModal').classList.add('flex');
            document.getElementById('promptTitle').focus();
        }

        function showEditPromptModal(id) {
            const prompt = state.prompts.find(p => p.id === id);
            if (!prompt) return;
            document.getElementById('promptModalTitle').textContent = 'Edit Prompt';
            document.getElementById('editPromptId').value = id;
            document.getElementById('promptTitle').value = prompt.title;
            document.getElementById('promptProject').value = prompt.project || '';
            document.getElementById('promptCategory').value = prompt.category || '';
            document.getElementById('promptContent').value = prompt.content;
            document.getElementById('modalCharCount').textContent = prompt.content.length + ' chars';
            updateProjectSelect();
            document.getElementById('promptProject').value = prompt.project || '';
            document.getElementById('promptModal').classList.remove('hidden');
            document.getElementById('promptModal').classList.add('flex');
            document.getElementById('promptTitle').focus();
        }

        function closePromptModal() {
            document.getElementById('promptModal').classList.add('hidden');
            document.getElementById('promptModal').classList.remove('flex');
        }

        function savePrompt() {
            const id = document.getElementById('editPromptId').value;
            const title = document.getElementById('promptTitle').value.trim();
            const project = document.getElementById('promptProject').value;
            const category = document.getElementById('promptCategory').value.trim();
            const content = document.getElementById('promptContent').value.trim();

            if (!title) { showToast('Title is required', 'red'); return; }
            if (!content) { showToast('Content is required', 'red'); return; }

            if (id) {
                const idx = state.prompts.findIndex(p => p.id === id);
                if (idx !== -1) {
                    state.prompts[idx] = { ...state.prompts[idx], title, project, category, content, updatedAt: Date.now() };
                }
            } else {
                state.prompts.unshift({
                    id: generateId(),
                    title,
                    project,
                    category,
                    content,
                    rtlOverride: null,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                });
            }

            saveState();
            closePromptModal();
            renderAll();
            showToast(id ? 'Prompt updated' : 'Prompt created');
        }

        function deletePrompt(id) {
            if (!confirm('Delete this prompt?')) return;
            state.prompts = state.prompts.filter(p => p.id !== id);
            saveState();
            renderAll();
            showToast('Prompt deleted');
        }

        function toggleRTL(id) {
            const prompt = state.prompts.find(p => p.id === id);
            if (!prompt) return;
            if (prompt.rtlOverride === null) prompt.rtlOverride = !isRTL(prompt.content);
            else if (prompt.rtlOverride === true) prompt.rtlOverride = false;
            else prompt.rtlOverride = null;
            saveState();
            renderPrompts();
        }

        async function copyPrompt(id) {
            const prompt = state.prompts.find(p => p.id === id);
            if (!prompt) return;
            try {
                await navigator.clipboard.writeText(prompt.content);
                const btn = document.getElementById(`copyBtn-${id}`);
                btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!`;
                btn.classList.remove('bg-xaccent/10', 'text-xaccent');
                btn.classList.add('bg-green-500/20', 'text-green-400');
                setTimeout(() => {
                    btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy`;
                    btn.classList.add('bg-xaccent/10', 'text-xaccent');
                    btn.classList.remove('bg-green-500/20', 'text-green-400');
                }, 1500);
            } catch (e) {
                showToast('Failed to copy', 'red');
            }
        }

        // ===== Project CRUD =====
        function showNewProjectModal() {
            document.getElementById('projectName').value = '';
            document.getElementById('projectModal').classList.remove('hidden');
            document.getElementById('projectModal').classList.add('flex');
            document.getElementById('projectName').focus();
        }

        function closeProjectModal() {
            document.getElementById('projectModal').classList.add('hidden');
            document.getElementById('projectModal').classList.remove('flex');
        }

        function saveProject() {
            const name = document.getElementById('projectName').value.trim();
            if (!name) { showToast('Project name is required', 'red'); return; }
            if (state.projects.includes(name)) { showToast('Project already exists', 'red'); return; }
            state.projects.push(name);
            saveState();
            closeProjectModal();
            renderAll();
            showToast('Project created');
        }

        function deleteProject(name) {
            if (!confirm(`Delete project "${name}"? Prompts won't be deleted.`)) return;
            state.projects = state.projects.filter(p => p !== name);
            state.prompts.forEach(p => { if (p.project === name) p.project = ''; });
            if (state.selectedProject === name) state.selectedProject = 'all';
            saveState();
            renderAll();
            showToast('Project deleted');
        }

        // ===== Utils =====
        function generateId() {
            return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, color = 'green') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 ${color === 'red' ? 'bg-red-500' : 'bg-green-500'} text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg z-[100] transition-all duration-300`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('fixed');
            sidebar.classList.toggle('inset-0');
            sidebar.classList.toggle('z-40');
            sidebar.classList.toggle('w-64');
        }

        // ===== Render All =====
        function renderAll() {
            renderProjects();
            renderCategories();
            renderPrompts();
        }

        // ===== Content char counter in modal =====
        document.getElementById('promptContent').addEventListener('input', function () {
            document.getElementById('modalCharCount').textContent = this.value.length + ' chars';
        });

        // ===== Keyboard shortcuts =====
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closePromptModal();
                closeProjectModal();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // ===== Init =====
        loadState();
        renderAll();
    </script>
</body>
</html>
